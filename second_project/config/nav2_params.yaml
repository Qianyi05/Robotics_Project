amcl:
  ros__parameters:
    use_sim_time: true
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: "base_scan"
    tf_broadcast: true

    robot_model_type: "nav2_amcl::OmniMotionModel"

    # Stage starts the robot at map (0, 0, 0), so AMCL can initialize there.
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

    min_particles: 500
    max_particles: 2000
    update_min_d: 0.20
    update_min_a: 0.15
    transform_tolerance: 1.0

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0

    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.10
      movement_time_allowance: 2.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.5
      yaw_goal_tolerance: 1.57    

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      holonomic_robot: true
      debug_trajectory_details: false

      # Gentle omnidirectional motion for narrow Stage passages.
      # Prefer lateral sliding over rotating the rectangular body in tight gaps.
      min_vel_x: -0.18
      max_vel_x: 0.25
      min_vel_y: -0.18
      max_vel_y: 0.25
      max_vel_theta: 0.35

      min_speed_xy: 0.0
      max_speed_xy: 0.22
      min_speed_theta: 0.0

      acc_lim_x: 0.4
      acc_lim_y: 0.4
      acc_lim_theta: 1.2
      decel_lim_x: -0.4
      decel_lim_y: -0.4
      decel_lim_theta: -1.2

      vx_samples: 15
      vy_samples: 20
      vtheta_samples: 20

      sim_time: 1.0
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.5

      xy_goal_tolerance: 0.50
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: true
      stateful: true

      critics:
        [
          "RotateToGoal",
          "Oscillation",
          "BaseObstacle",
          "GoalAlign",
          "PathAlign",
          "PathDist",
          "GoalDist"
        ]

      # Moderate obstacle penalty without making narrow passages impassable.
      BaseObstacle.scale: 1.5

      PathAlign.scale: 8.0
      GoalAlign.scale: 1.0
      PathDist.scale: 14.0
      GoalDist.scale: 18.0

      RotateToGoal.scale: 4.0
      RotateToGoal.slowing_factor: 2.0
      RotateToGoal.lookahead_time: -1.0

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20

behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.5
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]

    spin:
      plugin: "nav2_behaviors/Spin"

    backup:
      plugin: "nav2_behaviors/BackUp"
      acceleration_limit: 0.5
      deceleration_limit: -0.5
      minimum_speed: 0.10

    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
      acceleration_limit: 0.5
      deceleration_limit: -0.5
      minimum_speed: 0.08

    wait:
      plugin: "nav2_behaviors/Wait"

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05

      # Match the Stage robot body: size [0.55 0.50 0.30].
      footprint: "[[0.306, 0.290], [0.306, -0.290], [-0.306, -0.290], [-0.306, 0.290]]"
      footprint_padding: 0.01

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan

        scan:
          topic: /base_scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          obstacle_max_range: 2.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.40
        cost_scaling_factor: 2.5

      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05

      footprint: "[[0.306, 0.290], [0.306, -0.290], [-0.306, -0.290], [-0.306, 0.290]]"
      footprint_padding: 0.01

      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55
        cost_scaling_factor: 2.5

      always_send_full_costmap: true

waypoint_follower:
  ros__parameters:
    use_sim_time: true
